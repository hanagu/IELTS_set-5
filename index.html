        body {

        /* 3D Flip Effect Styles */
        .card-container {
            perspective: 1000px;
        }

            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;

            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; /* Safari */
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;

            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);

        }

        .card-front {
            background-color: white;
            color: #1F2937; /* gray-800 */
            border: 2px solid #E5E7EB;
        }

        .card-back {
            background-color: #BE123C; /* Rose-700 (Set 5 Theme) */
            color: white;
            transform: rotateY(180deg);
        }

            { word: "Unique", ipa: "/juːˈniːk/", meaning: "독특한, 유일한", sentence: "Each snowflake is unique.", translation: "각 눈송이는 독특하다." },
            { word: "Utilise", ipa: "/ˈjuːtɪlaɪz/", meaning: "활용하다, 이용하다", sentence: "We must utilise our resources efficiently.", translation: "우리는 자원을 효율적으로 활용해야 한다." },
            { word: "Valid", ipa: "/ˈvælɪd/", meaning: "유효한, 타당한", sentence: "Your passport is no longer valid.", translation: "당신의 여권은 더 이상 유효하지 않다." },
            { word: "Value", ipa: "/ˈvæljuː/", meaning: "가치, 소중히 여기다", sentence: "I value your friendship.", translation: "나는 너의 우정을 소중히 여긴다." },
            { word: "Variable", ipa: "/ˈveərɪəbᵊl/", meaning: "변수, 변하기 쉬운", sentence: "The weather is variable today.", translation: "오늘 날씨는 변덕스럽다." },
            { word: "Vary", ipa: "/ˈveəri/", meaning: "다르다, 다양하다", sentence: "Opinions vary on this subject.", translation: "이 주제에 대한 의견은 다양하다." },
            { word: "Vehicle", ipa: "/ˈviːɪkᵊl/", meaning: "차량, 수단", sentence: "A car is a type of vehicle.", translation: "자동차는 차량의 한 종류이다." },
            { word: "Version", ipa: "/ˈvɜːʃᵊn/", meaning: "버전, 판", sentence: "This is the latest version of the software.", translation: "이것은 소프트웨어의 최신 버전이다." },
            { word: "Via", ipa: "/ˈvaɪə/", meaning: "~을 경유하여, ~을 통하여", sentence: "We flew to London via Paris.", translation: "우리는 파리를 경유해 런던으로 날아갔다." },
            { word: "Visible", ipa: "/ˈvɪzɪbᵊl/", meaning: "보이는, 가시적인", sentence: "The stars are visible tonight.", translation: "오늘 밤은 별이 보인다." },
            { word: "Vision", ipa: "/ˈvɪʒᵊn/", meaning: "시력, 비전", sentence: "She has excellent vision.", translation: "그녀는 시력이 좋다." },
            { word: "Voluntary", ipa: "/ˈvɒləntəri/", meaning: "자발적인", sentence: "Attendance is voluntary.", translation: "참석은 자발적이다." },
            { word: "Welfare", ipa: "/ˈwɛlfeə/", meaning: "복지, 안녕", sentence: "The state is responsible for the welfare of its citizens.", translation: "국가는 국민의 복지에 책임이 있다." },
            { word: "Whereas", ipa: "/weərˈæz/", meaning: "반면에", sentence: "He likes football, whereas I prefer tennis.", translation: "그는 축구를 좋아하지만, 반면에 나는 테니스를 선호한다." },
            { word: "Widespread", ipa: "/ˈwaɪdsprɛd/", meaning: "광범위한, 널리 퍼진", sentence: "There is widespread support for the proposal.", translation: "그 제안에 대한 광범위한 지지가 있다." },
            { word: "Whilst", ipa: "/waɪlst/", meaning: "~하는 동안, 반면에 (while)", sentence: "Listen whilst I explain.", translation: "내가 설명하는 동안 들어라." },
            { word: "Whole", ipa: "/həʊl/", meaning: "전체의, 모든", sentence: "I spent the whole day cleaning.", translation: "나는 하루 종일 청소하며 보냈다." },
            { word: "Willing", ipa: "/ˈwɪlɪŋ/", meaning: "기꺼이 하는", sentence: "Are you willing to help?", translation: "기꺼이 도와주시겠습니까?" },
            { word: "Yield", ipa: "/jiːld/", meaning: "산출하다, 양보하다", sentence: "The investment yielded a high profit.", translation: "그 투자는 높은 수익을 냈다." }
        ];

        let currentCardIndex = 0;
        let shuffledVocabulary = [...vocabulary]; // Clone the original array

        // Get DOM elements
        const cardContainer = document.getElementById('flashcard-container');
        const frontWordEl = document.getElementById('front-word');
        const frontIpaEl = document.getElementById('front-ipa'); // New IPA Element
        const backMeaningEl = document.getElementById('back-meaning');
        const backSentenceEl = document.getElementById('back-sentence');
        const backTranslationEl = document.getElementById('back-translation');
        const cardCounterEl = document.getElementById('card-counter');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');

        // Function to load card content
        function loadCard(index) {
            if (index < 0 || index >= shuffledVocabulary.length) return;

            currentCardIndex = index;
            const cardData = shuffledVocabulary[index];

            // Update Card Front
            frontWordEl.textContent = cardData.word;
            frontIpaEl.textContent = cardData.ipa; // Set IPA

            // Update Card Back
            backMeaningEl.textContent = cardData.meaning;
            backSentenceEl.textContent = cardData.sentence;
            backTranslationEl.textContent = cardData.translation;

            // Update counter 
            cardCounterEl.textContent = `Card ${index + 1} / ${shuffledVocabulary.length}`;

            // Reset card to front face
            cardContainer.classList.remove('is-flipped');
        }

        // Function to flip card
        function flipCard() {
            cardContainer.classList.toggle('is-flipped');
        }

        // Show next card
        function nextCard() {
            const nextIndex = (currentCardIndex + 1) % shuffledVocabulary.length;
            loadCard(nextIndex);
        }

        // Show previous card
        function prevCard() {
            const prevIndex = (currentCardIndex - 1 + shuffledVocabulary.length) % shuffledVocabulary.length;
            loadCard(prevIndex);
        }

        // Shuffle cards (Fisher-Yates algorithm)
        function shuffleCards() {
            let m = shuffledVocabulary.length, t, i;
            while (m) {
                i = Math.floor(Math.random() * m--);
                t = shuffledVocabulary[m];
                shuffledVocabulary[m] = shuffledVocabulary[i];
                shuffledVocabulary[i] = t;
            }
            loadCard(0);
        }

        // Event Listeners
        cardContainer.addEventListener('click', flipCard);
        nextBtn.addEventListener('click', nextCard);
        prevBtn.addEventListener('click', prevCard);
        shuffleBtn.addEventListener('click', shuffleCards);

        // On page load, shuffle and display the first card
        shuffleCards();
        loadCard(0);
    </script>
</body>
</html>
